    <rect x="120" y="0" width="24" height="24" fill="#3b7f3b" />
    <rect x="144" y="0" width="24" height="24" fill="#2e6b2e" />
    <rect x="168" y="0" width="24" height="24" fill="#3b7f3b" />
    <rect x="0" y="24" width="24" height="24" fill="#3b7f3b" />
    <rect x="24" y="24" width="24" height="24" fill="#2e6b2e" />
    <rect x="48" y="24" width="24" height="24" fill="#3b7f3b" />
    <rect x="72" y="24" width="24" height="24" fill="#2e6b2e" />
    <rect x="96" y="24" width="24" height="24" fill="#3b7f3b" />
    <rect x="120" y="24" width="24" height="24" fill="#2e6b2e" />
    <rect x="144" y="24" width="24" height="24" fill="#3b7f3b" />
    <rect x="168" y="24" width="24" height="24" fill="#2e6b2e" />
    <rect x="0" y="48" width="24" height="24" fill="#2e6b2e" />
    <rect x="24" y="48" width="24" height="24" fill="#3b7f3b" />
    <rect x="48" y="48" width="24" height="24" fill="#2e6b2e" />
    <rect x="72" y="48" width="24" height="24" fill="#3b7f3b" />
    <rect x="96" y="48" width="24" height="24" fill="#2e6b2e" />
    <rect x="120" y="48" width="24" height="24" fill="#3b7f3b" />
    <rect x="144" y="48" width="24" height="24" fill="#2e6b2e" />
